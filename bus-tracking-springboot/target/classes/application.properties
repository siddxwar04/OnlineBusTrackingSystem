# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Application Name ─────────────────────────────────────────
spring.application.name=bus-tracking-springboot

# ── MySQL Database ────────────────────────────────────────────
# CHANGE these values to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/bus_tracking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# "update"  → auto-creates/updates tables (good for development)
# "validate"→ just checks tables exist (use in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Session ──────────────────────────────────────────────────
server.servlet.session.timeout=30m

# ── JSON ─────────────────────────────────────────────────────
spring.jackson.serialization.indent-output=true

# ── Logging ──────────────────────────────────────────────────
logging.level.com.bustracking=INFO
logging.level.org.springframework=WARN

# ── Static Resources (QR image) ──────────────────────────────
spring.web.resources.static-locations=classpath:/static/

# ── API Endpoints Reference ───────────────────────────────────
# POST /data/login           Admin: admin/admin | Driver: driver/driver
# GET  /data/view            Dashboard poll (every 5s)
# GET  /data/send            IoT: ?temp=34&oil=1&ticket=50&latitude=..&longitude=..&seatCount=42&speed=60
# POST /data/trip/start      Start trip + logging
# POST /data/trip/stop       Stop trip
# GET  /data/trip/status     Trip status
# GET  /data/export          Download CSV of current trip
# GET  /data/buses           List all buses
